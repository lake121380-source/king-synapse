name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Format and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test evaluation crate
        run: cargo test -p synapse-eval
