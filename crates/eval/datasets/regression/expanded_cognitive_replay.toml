seed = "day01 skipped hydration before scooter commute lowered mood"
visible_distractor = "day01 scooter maintenance receipt and tire pressure note"
hidden = "tired mood reduces commute attention and raises scooter fall risk"
hidden_distractor = "weekend laundry receipt sorting plan"
future = "future commute mistake risk increases when attention narrows"
future_distractor = "bike helmet color comparison"
state_terms = ["tired", "mood", "future"]
goal_terms = ["commute", "attention", "risk"]

