[[cases]]
id = "preference_001_speed_to_reliability"
task_type = "longitudinal_consistency"
challenges = ["preference", "contradiction", "temporal_revision"]
question = "The user once preferred speed, then suffered a reliability incident. What should the next plan optimize for?"
expected_decision = "optimize_for_reliability"
distractor_decision = "optimize_for_speed"
relevant_memories = ["old_preference_speed", "speed_first_caused_incident", "incident_review_reliability", "current_task_customer_impact"]
expected_trace = ["old_preference_speed", "speed_first_caused_incident", "incident_review_reliability", "current_task_customer_impact"]
expected_influence_delta = 0.78
expected_governance_action = "observe"
profile = "preference_revision"

