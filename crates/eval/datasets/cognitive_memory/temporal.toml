expected_influence_delta = 0.77
expected_governance_action = "observe"
profile = "temporal_reasoning"

[[cases]]
id = "temporal_005_borderline_recent_signal"
task_type = "longitudinal_consistency"
challenges = ["temporal_reasoning", "ambiguity"]
question = "A recent weak signal conflicts with older stable evidence. What should Synapse do?"
expected_decision = "observe_without_full_switch"
distractor_decision = "fully_switch_to_recent_signal"
relevant_memories = ["older_stable_evidence", "recent_weak_conflicting_signal", "uncertainty_high", "current_context_not_yet_decisive"]
