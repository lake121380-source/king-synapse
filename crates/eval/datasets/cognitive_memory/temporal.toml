[[cases]]
id = "temporal_001_recent_policy_over_old_rule"
task_type = "longitudinal_consistency"
challenges = ["temporal_reasoning", "temporal_revision"]
question = "An old rule allowed direct deploys, but the recent policy requires staged rollout. What now?"
expected_decision = "use_staged_rollout"
distractor_decision = "deploy_directly"
relevant_memories = ["old_rule_direct_deploy", "recent_incident_changed_policy", "staged_rollout_policy", "current_release_is_external"]
expected_trace = ["old_rule_direct_deploy", "recent_incident_changed_policy", "staged_rollout_policy", "current_release_is_external"]
expected_influence_delta = 0.78
expected_governance_action = "observe"
profile = "temporal_reasoning"

[[cases]]
id = "temporal_002_old_metric_new_metric"
task_type = "multi_hop_causal"
challenges = ["temporal_reasoning", "contradiction"]
question = "The old metric favored growth, but the recent retention metric showed churn. What should guide the decision?"
expected_decision = "optimize_for_retention_quality"
distractor_decision = "optimize_for_growth_metric"
relevant_memories = ["old_growth_metric_win", "recent_retention_drop", "retention_quality_playbook", "current_goal_long_term_users"]
expected_trace = ["old_growth_metric_win", "recent_retention_drop", "retention_quality_playbook", "current_goal_long_term_users"]
expected_influence_delta = 0.79
expected_governance_action = "observe"
profile = "temporal_reasoning"

[[cases]]
id = "temporal_003_fixed_bug_reopened"
task_type = "multi_hop_causal"
challenges = ["temporal_reasoning", "failure_learning"]
question = "A bug was fixed, but later reopened with a new root cause. What should happen?"
expected_decision = "investigate_new_root_cause"
distractor_decision = "reuse_old_fix"
relevant_memories = ["old_bug_fix_worked", "bug_reopened_later", "new_root_cause_identified", "current_symptom_matches_reopened_bug"]
expected_trace = ["old_bug_fix_worked", "bug_reopened_later", "new_root_cause_identified", "current_symptom_matches_reopened_bug"]
expected_influence_delta = 0.80
expected_governance_action = "observe"
profile = "temporal_reasoning"

[[cases]]
id = "temporal_004_expired_vendor_claim"
task_type = "retrieval_vs_reasoning"
challenges = ["temporal_reasoning", "context_shift"]
question = "A vendor claim was true last year but a current benchmark changed it. What should be believed?"
expected_decision = "trust_current_benchmark"
