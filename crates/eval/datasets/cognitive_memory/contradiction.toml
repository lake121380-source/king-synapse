[[cases]]
id = "contradiction_001_fast_vs_stable"
task_type = "longitudinal_consistency"
challenges = ["contradiction", "temporal_revision", "preference"]
question = "Old notes say fast delivery matters; newer notes say stability prevented incidents. What should win now?"
expected_decision = "prefer_stability_for_current_context"
distractor_decision = "prefer_fast_delivery"
relevant_memories = ["old_fast_delivery_preference", "fast_delivery_incident", "new_stability_policy", "current_context_high_risk"]
expected_trace = ["old_fast_delivery_preference", "fast_delivery_incident", "new_stability_policy", "current_context_high_risk"]
expected_influence_delta = 0.80
expected_governance_action = "observe"
profile = "contradiction_resolution"

