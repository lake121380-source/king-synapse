suite = "governance"

[[cases]]
id = "failure_memory_should_not_block_exploration"
task_type = "governance_trace"
challenges = ["contradiction", "governance_boundary", "exploration_preservation"]
question = "A previous launch failed, but the new launch has validation evidence. Should exploration be blocked?"
expected_decision = "preserve_exploration_with_guardrails"
relevant_memories = [
  "launch_failed_once",
  "failure_caused_by_missing_validation",
  "new_launch_has_validation",
  "exploration_remains_high_value",
]
expected_trace = [
  "launch_failed_once",
  "failure_caused_by_missing_validation",
  "new_launch_has_validation",
  "exploration_remains_high_value",
]
expected_influence_delta = 0.72
expected_governance_action = "intervene"

[[cases.methods]]
method = "vector_rag"
retrieved = ["launch_failed_once", "failure_caused_by_missing_validation"]
trace = ["launch_failed_once"]
decision = "block_exploration"
confidence = 0.70
influence_delta = 0.12
governance_action = "none"

[[cases.methods]]
method = "bm25_rag"
retrieved = ["new_launch_has_validation", "exploration_remains_high_value"]
